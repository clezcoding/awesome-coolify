# Label definitions, synced via .github/workflows/labels.yml (EndBug/label-sync)
# Format: https://github.com/EndBug/label-sync

# --- Type ---
- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working as expected"
- name: "type: feature"
  color: "a2eeef"
  description: "New functionality"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation"
- name: "type: chore"
  color: "fef2c0"
  description: "Maintenance, tooling, dependencies"
- name: "type: refactor"
  color: "c5def5"
  description: "Code restructuring without behavior change"
- name: "type: test"
  color: "bfd4f2"
  description: "Adding or fixing tests"
- name: "type: perf"
  color: "f9d0c4"
  description: "Performance improvement"

# --- Priority ---
- name: "priority: critical"
  color: "b60205"
  description: "Must be fixed immediately"
- name: "priority: high"
  color: "d93f0b"
  description: "Important soon"
- name: "priority: medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority: low"
  color: "0e8a16"
  description: "Can wait"

# --- Status ---
- name: "status: needs-triage"
  color: "ededed"
  description: "Not yet triaged"
- name: "status: blocked"
  color: "e11d21"
  description: "Waiting on an external dependency/decision"
- name: "status: in-progress"
  color: "1d76db"
  description: "Currently being worked on"
- name: "status: needs-review"
  color: "5319e7"
  description: "Waiting for review"

# --- GSD phase (Discuss → Plan → Execute → Verify → Ship) ---
- name: "gsd: discuss"
  color: "cfe2f3"
  description: "Discuss phase"
- name: "gsd: plan"
  color: "9fc5e8"
  description: "Plan phase"
- name: "gsd: execute"
  color: "6fa8dc"
  description: "Execute phase"
- name: "gsd: verify"
  color: "3d85c6"
  description: "Verify phase"
- name: "gsd: ship"
  color: "0b5394"
  description: "Ship phase"

# --- Size (for PRs) ---
- name: "size: XS"
  color: "c2e0c6"
  description: "< 10 lines"
- name: "size: S"
  color: "bfe5bf"
  description: "< 50 lines"
- name: "size: M"
  color: "fef2c0"
  description: "< 200 lines"
- name: "size: L"
  color: "f9d0c4"
  description: "< 500 lines"
- name: "size: XL"
  color: "f4a6a6"
  description: ">= 500 lines, consider splitting"

# --- Other ---
- name: "good first issue"
  color: "7057ff"
  description: "Good entry point for new contributors"
- name: "help wanted"
  color: "008672"
  description: "External help welcome"
- name: "wontfix"
  color: "ffffff"
  description: "Will not be worked on"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already reported elsewhere"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates (used by Dependabot)"
