version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "type: chore"
    ignore:
      # Hold TS 6/7 until explicit migration — stay on TS 5.x
      - dependency-name: "typescript"
        versions: ["6.x", "7.x"]
      # @types/node major must match engines.node (>=22.14) — not future Node majors
      - dependency-name: "@types/node"
        versions: [">=23"]
    commit-message:
      prefix: "chore"
      include: "scope"

  # Keep GitHub Actions versions themselves up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "type: chore"
    commit-message:
      prefix: "chore"
      include: "scope"
