name-template: "$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "* $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<\>\*'
template: |
  ## What's Changed

  $CHANGES

  ## 🚀 Features

  $CONTRIBUTOR
categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
    keywords:
      - feat
      - feature
  - title: "🐛 Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
    keywords:
      - fix
      - bugfix
  - title: "⚡ Performance"
    keywords:
      - perf
  - title: "♻️ Refactoring"
    keywords:
      - refactor
  - title: "📚 Documentation"
    keywords:
      - docs
  - title: "🧪 Tests"
    keywords:
      - test
  - title: "🔧 Chores"
    keywords:
      - chore
      - ci
exclude-labels:
  - skip-changelog
filter-by-commitish: true
commitish: main
