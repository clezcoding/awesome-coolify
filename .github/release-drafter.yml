# Categories must each have labels — only ONE category may omit labels
# (uncategorized catch-all). Keywords-only categories are invalid in v6.
name-template: "$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "* $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<\>\*'
template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
categories:
  - title: "🚀 Features"
    labels:
      - "type: feature"
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - "type: bug"
      - bug
      - bugfix
      - fix
  - title: "⚡ Performance"
    labels:
      - "type: perf"
  - title: "♻️ Refactoring"
    labels:
      - "type: refactor"
  - title: "📚 Documentation"
    labels:
      - "type: docs"
      - documentation
  - title: "🧪 Tests"
    labels:
      - "type: test"
  - title: "🔧 Chores"
    labels:
      - "type: chore"
      - dependencies
      - ci
  - title: "🔒 Security"
    labels:
      - "type: security"
  # Single catch-all without labels (required limit: one)
  - title: "📦 Other"
exclude-labels:
  - skip-changelog
filter-by-commitish: true
commitish: main
