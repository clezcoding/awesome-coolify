name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Adjust script names below to match your package.json
      # if they differ, or swap npm for pnpm/yarn.
      - name: Lint & Build
        run: npm run lint

      - name: Tests
        run: npm test
