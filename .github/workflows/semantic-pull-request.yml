name: Semantic Pull Request

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    # Skip bots: Changesets "Version Packages" + Dependabot titles are not conventional
    if: ${{ !contains(fromJSON('["github-actions[bot]","dependabot[bot]"]'), github.event.pull_request.user.login) }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Multiline list required — comma-separated is treated as one invalid type
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            style
            perf
            build
            ci
            revert
          requireScope: false
