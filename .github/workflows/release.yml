name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version PR / Create Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 # changesets commits must not hit local commit-msg hooks in CI
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Opens a "Version Packages" PR when changesets land on main.
      # After that PR merges: `publish` must be set or the action skips
      # tag/release creation ("Not publishing because no publish script found").
      # We only emit a New-tag line — action creates the GitHub Release/tag;
      # publish.yml then npm-publishes via OIDC on `release: published`.
      - name: Changesets
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run changeset:emit-tag
          createGithubReleases: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
