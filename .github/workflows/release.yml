name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version PR / Create Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 # changesets commits must not hit local commit-msg hooks in CI
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Automatically opens a "Version Packages" PR whenever changesets
      # land on main. Merging that PR creates the GitHub Release + tag,
      # which triggers publish.yml (npm Trusted Publishing) below.
      - name: Changesets
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          version: npm run version # runs "changeset version" (add this script to package.json)
          create-github-releases: true
          push-git-tags: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
