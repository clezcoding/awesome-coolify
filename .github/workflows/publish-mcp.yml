# Publishes the MCP server to the MCP Registry on every v* tag.
# The npm package itself is published separately by publish.yml via OIDC Trusted Publishing.

name: Publish MCP Server

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (e.g. 0.1.1) — manual backfill when tag predates workflow"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve semver version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish MCP Server
        uses: OtherVibes/mcp-publish-action@v1
        with:
          name: io.github.clezcoding/awesome-coolify
          description: "Coolify 4.1.x MCP server — deploy, diagnose, and manage apps, services, and databases"
          version: ${{ steps.ver.outputs.version }}
          registry_type: npm
          identifier: awesome-coolify-mcp
          transport_type: stdio
          website_url: https://github.com/clezcoding/awesome-coolify
