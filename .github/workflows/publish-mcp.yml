# Publishes MCP server metadata to the MCP Registry when a release tag is pushed.
# npm package is published separately by publish.yml (OIDC Trusted Publishing).
# Requires npm package at the same version with matching mcpName in package.json.

name: Publish MCP Server

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (e.g. 0.1.2) — run after npm publish succeeds"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  MCP_PUBLISHER_VERSION: v1.8.0

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve semver version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch server.json version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' mcp/server.json > mcp/server.json.tmp
          mv mcp/server.json.tmp mcp/server.json
          cat mcp/server.json

      - name: Install MCP Publisher
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo install -m 755 mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version || true

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish mcp/server.json
